apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: scale-down
spec:
  steps:
  - name: install doris cluster with 3 BE replicas
    try:
    - apply:
        file: doris.yaml
    - assert:
        file: doris-assert.yaml
  - name: scale down BE to 1 replica
    try:
    - apply:
        file: doris-scaled.yaml
  - name: verify scaled-down cluster
    try:
    - assert:
        file: doris-scaled-assert.yaml
